stages:
  preprocess:
    cmd: python preprocess.py
    deps:
      - preprocess.py
      - data/titanic.csv
    outs:
      - data/processed

  train:
    cmd: python train.py
    deps:
      - train.py
      - data/processed/train.csv
    outs:
      - models/model.pkl

  validate:
    cmd: python validate.py
    deps:
      - validate.py
      - models/model.pkl
      - data/processed/test.csv
    metrics:
      - reports/metrics.json
    plots:
      - reports/confusion_matrix.png